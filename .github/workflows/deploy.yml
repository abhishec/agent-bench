name: Deploy AgentBench

on:
  push:
    branches: [main]
    paths:
      - 'green-agent/**'
      - 'purple-agent/**'
      - 'buildspec.yml'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - green
          - purple
      skip_build:
        description: 'Skip CodeBuild (just redeploy ECS from existing image)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: nexusbrain-training
  CODEBUILD_PROJECT: agentbench-image-builder
  S3_BUCKET: nexusbrain-codebuild-source-848269696611
  S3_KEY: agentbench/source.zip
  GREEN_SERVICE: agentbench-green
  PURPLE_SERVICE: agentbench-purple
  GREEN_TASK_DEF: agentbench-green:4
  PURPLE_TASK_DEF: agentbench-purple:3
  GREEN_URL: https://benchmark.usebrainos.com
  PURPLE_URL: https://purple.agentbench.usebrainos.com

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build images via CodeBuild
  # ─────────────────────────────────────────────
  build:
    name: Build Images (CodeBuild)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}
    outputs:
      build_id: ${{ steps.start_build.outputs.build_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Zip and upload source to S3
        run: |
          zip -r /tmp/source.zip . \
            --exclude "*.git*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".github/*" \
            -q
          aws s3 cp /tmp/source.zip s3://${{ env.S3_BUCKET }}/${{ env.S3_KEY }}
          echo "✅ Source uploaded ($(du -sh /tmp/source.zip | cut -f1))"

      - name: Start CodeBuild
        id: start_build
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name ${{ env.CODEBUILD_PROJECT }} \
            --query 'build.id' --output text)
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "🔨 Build started: $BUILD_ID"

      - name: Wait for CodeBuild to complete
        run: |
          BUILD_ID="${{ steps.start_build.outputs.build_id }}"
          echo "Waiting for build: $BUILD_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' --output text)
            echo "  [$i] $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Build succeeded"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "STOPPED" ]; then
              echo "❌ Build $STATUS"
              # Print build logs URL
              LOGS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
                --query 'builds[0].logs.deepLink' --output text)
              echo "Logs: $LOGS"
              exit 1
            fi
            sleep 20
          done
          echo "❌ Build timed out"
          exit 1

  # ─────────────────────────────────────────────
  # JOB 2a: Deploy Green Agent
  # ─────────────────────────────────────────────
  deploy-green:
    name: Deploy Green Agent
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (github.event.inputs.service == 'green' || github.event.inputs.service == 'both' || github.event.inputs.service == '')

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force deploy green ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.GREEN_SERVICE }} \
            --task-definition ${{ env.GREEN_TASK_DEF }} \
            --force-new-deployment \
            --query 'service.serviceName' --output text
          echo "🚀 Green deployment triggered"

      - name: Wait for green to stabilize
        run: |
          echo "Waiting for green service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.GREEN_SERVICE }}
          echo "✅ Green service stable"

      - name: Verify green health
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -sf ${{ env.GREEN_URL }}/health 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Green healthy: $RESPONSE"
              exit 0
            fi
            echo "  [$i] Not ready yet, waiting 15s..."
            sleep 15
          done
          echo "❌ Green health check failed"
          exit 1

      - name: Verify green agent card
        run: |
          CARD=$(curl -sf ${{ env.GREEN_URL }}/.well-known/agent-card.json)
          VERSION=$(echo "$CARD" | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          URL=$(echo "$CARD" | python3 -c "import json,sys; print(json.load(sys.stdin)['url'])")
          SKILLS=$(echo "$CARD" | python3 -c "import json,sys; print(len(json.load(sys.stdin)['skills']))")
          echo "version=$VERSION  url=$URL  skills=$SKILLS"
          if [ "$URL" = "${{ env.GREEN_URL }}" ]; then
            echo "✅ Agent card correct"
          else
            echo "⚠️  Agent card URL mismatch: $URL != ${{ env.GREEN_URL }}"
          fi

  # ─────────────────────────────────────────────
  # JOB 2b: Deploy Purple Agent
  # ─────────────────────────────────────────────
  deploy-purple:
    name: Deploy Purple Agent
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (github.event.inputs.service == 'purple' || github.event.inputs.service == 'both' || github.event.inputs.service == '')

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force deploy purple ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.PURPLE_SERVICE }} \
            --task-definition ${{ env.PURPLE_TASK_DEF }} \
            --force-new-deployment \
            --query 'service.serviceName' --output text
          echo "🚀 Purple deployment triggered"

      - name: Wait for purple to stabilize
        run: |
          echo "Waiting for purple service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.PURPLE_SERVICE }}
          echo "✅ Purple service stable"

      - name: Verify purple health
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -sf ${{ env.PURPLE_URL }}/health 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Purple healthy: $RESPONSE"
              exit 0
            fi
            echo "  [$i] Not ready yet, waiting 15s..."
            sleep 15
          done
          echo "❌ Purple health check failed"
          exit 1

      - name: Verify purple agent card + intelligence
        run: |
          HEALTH=$(curl -sf ${{ env.PURPLE_URL }}/health)
          INTEL=$(echo "$HEALTH" | python3 -c "import json,sys; print(json.load(sys.stdin).get('has_benchmark_intelligence', False))")
          CARD=$(curl -sf ${{ env.PURPLE_URL }}/.well-known/agent-card.json)
          URL=$(echo "$CARD" | python3 -c "import json,sys; print(json.load(sys.stdin)['url'])")
          echo "url=$URL  has_benchmark_intelligence=$INTEL"
          if [ "$URL" = "${{ env.PURPLE_URL }}" ]; then
            echo "✅ Purple agent card correct"
          else
            echo "⚠️  Purple agent card URL mismatch: $URL != ${{ env.PURPLE_URL }}"
          fi

  # ─────────────────────────────────────────────
  # JOB 3: Smoke test end-to-end
  # ─────────────────────────────────────────────
  smoke-test:
    name: End-to-End Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-green, deploy-purple]
    if: always() && (needs.deploy-green.result == 'success' || needs.deploy-purple.result == 'success')

    steps:
      - name: Run quick benchmark (task_06 + task_24)
        run: |
          echo "Running smoke test: task_06 + task_24..."
          RESULT=$(curl -sf -X POST ${{ env.GREEN_URL }}/benchmark/batch \
            -H "Content-Type: application/json" \
            -d '{
              "task_ids": ["task_06", "task_24"],
              "purple_url": "${{ env.PURPLE_URL }}",
              "difficulty": "none"
            }')
          PASS_RATE=$(echo "$RESULT" | python3 -c "import json,sys; r=json.load(sys.stdin,strict=False); print(r['pass_rate'])")
          PASSED=$(echo "$RESULT" | python3 -c "import json,sys; r=json.load(sys.stdin,strict=False); print(r['passed'])")
          TOTAL=$(echo "$RESULT" | python3 -c "import json,sys; r=json.load(sys.stdin,strict=False); print(r['total'])")
          echo "Result: $PASSED/$TOTAL passed (rate=$PASS_RATE)"
          if [ "$PASS_RATE" = "1.0" ]; then
            echo "✅ Smoke test PASSED"
          else
            echo "⚠️  Smoke test partial: $PASSED/$TOTAL"
            echo "$RESULT" | python3 -c "
          import json,sys
          r=json.load(sys.stdin,strict=False)
          for t in r['results']:
              print(f'  {t[\"task_id\"]}: {t[\"scores\"].get(\"overall\",0)} - {\"PASS\" if t[\"scores\"].get(\"overall\",0)>=70 else \"FAIL\"}')
          "
          fi
        timeout-minutes: 5
